name: Deploy Pages (Landing + Storybook)

# 한 GitHub Pages 사이트에 두 가지를 함께 서빙한다:
#   /            → landing/ (마케팅 사이트, Next.js/Vercel 전환 전까지 임시)
#   /storybook/  → @timbre/design-system 스토리북 (main 푸시마다 갱신)
on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "packages/design-system/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/design-system
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/design-system/package-lock.json

      - name: Install design-system deps
        run: npm ci --no-audit --no-fund

      - name: Build Storybook (served under /vocast/storybook/)
        run: STORYBOOK_BASE=/vocast/storybook/ npm run build-storybook

      - name: Assemble site (landing at /, storybook at /storybook)
        working-directory: .
        run: |
          rm -rf _site && mkdir -p _site
          cp -R landing/. _site/
          mkdir -p _site/storybook
          cp -R packages/design-system/storybook-static/. _site/storybook/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
