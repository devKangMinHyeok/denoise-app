name: Deploy Storybook (Pages)

# GitHub Pages는 이제 Storybook만 서빙한다.
#   https://devkangminhyeok.github.io/vocast/  → @timbre/design-system 스토리북
# 정식 랜딩/블로그는 Vercel + 커스텀 도메인(vocast.me)으로 이전됨.
on:
  push:
    branches: [main]
    paths:
      - "packages/design-system/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build Storybook (served at /vocast/)
        run: STORYBOOK_BASE=/vocast/ pnpm --filter @timbre/design-system build-storybook

      - name: Assemble site (storybook at root)
        run: |
          rm -rf _site && mkdir -p _site
          cp -R packages/design-system/storybook-static/. _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
