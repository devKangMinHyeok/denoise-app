name: Quality Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0"  # 매주 월요일 오전 5시 (KST)

jobs:
  quality:
    runs-on: macos-14  # Apple Silicon (MLX 필요)
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ffmpeg
        run: brew install ffmpeg
      - name: Cache HF models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v1
      - name: Install deps
        run: |
          pip install -r requirements.txt -r voice/requirements-voice.txt
          pip install resemblyzer jiwer onnxruntime librosa "setuptools<81" pytest
      - name: Unit tests
        run: pytest tests -q
      - name: Quality eval (generate → score → gate)
        run: python3 quality/run_eval.py --fast --report quality-report.json
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.json
