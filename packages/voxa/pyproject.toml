[project]
name = "voxa"
version = "0.1.0"
description = "로컬 음성 엔진 — 보이스 클로닝·노이즈 제거·품질 지표. 앱/프레임워크에 독립적인 완결형 라이브러리 (Apple Silicon 우선)."
requires-python = ">=3.12,<3.13"

# 이 엔진이 스스로 필요로 하는 것만 선언한다 (flask·mcp 같은 앱 것은 없음).
# 어떤 제품이든 `voxa` 를 붙이면 이 의존성이 알아서 딸려온다.
# mlx-*는 Apple Silicon 전용(Metal). 타 OS에서는 자동 제외되고 클로닝만 비활성,
# 노이즈 제거·지표는 그대로 동작한다 (플랫폼 마커로 조건부 설치).
dependencies = [
    "numpy>=2.4",
    "scipy>=1.18",
    "librosa>=0.11",
    "soundfile>=0.14",
    "torch>=2.13",
    "torchaudio>=2.11",
    "pyworld>=0.3.5",
    "resemblyzer>=0.1.4",
    "huggingface-hub>=1.23",
    "imageio-ffmpeg>=0.6",       # ffmpeg 바이너리 동봉 (시스템 설치 불필요)
    "setuptools<81",             # resemblyzer/pyworld의 webrtcvad가 pkg_resources 사용
    "mlx-audio>=0.4.5; sys_platform == 'darwin' and platform_machine == 'arm64'",
    "mlx-whisper>=0.4.3; sys_platform == 'darwin' and platform_machine == 'arm64'",
]

[project.optional-dependencies]
# 품질 평가(DNSMOS onnx, CER)까지 쓸 때만
eval = ["onnxruntime>=1.20", "jiwer>=3.0"]

[dependency-groups]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["voxa"]

# 동봉 모델(rnnoise·dnsmos)을 휠에 포함 — 엔진이 자기 데이터를 들고 다닌다.
[tool.hatch.build]
artifacts = ["voxa/models/*"]
